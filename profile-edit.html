<div class="profile-container" style="padding: 15px; color: #fff; background-color: #121212; font-family: sans-serif;">
    <h2 style="color: #D4AF37; border-bottom: 1px solid #333; padding-bottom: 10px;">Barber Profile Setup</h2>
    
    <form id="barberProfileForm">
        <!-- 1. Profile Picture -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Profile Picture</label>
            <input type="file" id="profilePicInput" accept="image/*" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;" required>
        </div>

        <!-- 2. Working Experience -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Working Experience (Years)</label>
            <input type="number" id="experienceInput" min="0" placeholder="e.g. 3" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;" required>
        </div>

        <!-- 3. Pictures of Work (Portfolio) -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Pictures of Your Work / Portfolio</label>
            <input type="file" id="portfolioInput" accept="image/*" multiple style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
            <small style="color: #aaa; display: block; margin-top: 4px;">You can select multiple photos of your best haircuts.</small>
        </div>

        <!-- 4. Level of Education -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Level of Education</label>
            <select id="educationInput" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;" required>
                <option value="">-- Select Education Level --</option>
                <option value="Apprenticeship / Practical Training">Apprenticeship / Practical Training</option>
                <option value="High School / JHS / SHS">High School / JHS / SHS</option>
                <option value="Vocational / Barbering Certificate">Vocational / Barbering Certificate</option>
                <option value="Diploma / Higher Education">Diploma / Higher Education</option>
            </select>
        </div>

        <!-- 5. Payout Preference Choice -->
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Payment Preference</label>
            <select id="payoutTypeInput" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;" required>
                <option value="">-- Select How You Want to Be Paid --</option>
                <option value="Monthly Salary">Fixed Monthly Salary</option>
                <option value="Commission">Commission Basis (%)</option>
                <option value="Chair Rental">Chair Rent / Sales Fee</option>
            </select>
        </div>

        <!-- 6. Dynamic Financial Input Field -->
        <div id="dynamicPayoutContainer" class="form-group" style="margin-bottom: 20px; display: none;">
            <label id="payoutLabel" style="display: block; margin-bottom: 5px; font-weight: bold;">Amount</label>
            <div style="display: flex; align-items: center;">
                <span id="currencyPrefix" style="background: #333; padding: 8px 12px; border: 1px solid #444; border-right: none; border-radius: 4px 0 0 4px; font-weight: bold; color: #D4AF37;">GH₵</span>
                <input type="number" id="payoutAmountInput" min="0" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 0 4px 4px 0;" required>
                <span id="currencySuffix" style="background: #333; padding: 8px 12px; border: 1px solid #444; border-left: none; border-radius: 0 4px 4px 0; font-weight: bold; display: none;">%</span>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" style="width: 100%; padding: 12px; background-color: #D4AF37; color: #000; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer;">Save Barber Profile</button>
    </form>
</div>
