<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List an Available Chair</title>
  <style>
    body {
      background-color: #121212;
      color: #FFFFFF;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .form-container {
      background-color: #1E1E1E;
      border: 1px solid #333333;
      border-radius: 12px;
      padding: 25px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    h2 {
      color: #D4AF37;
      text-align: center;
      margin-bottom: 5px;
    }
    p.subtitle {
      color: #A9A9A9;
      text-align: center;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .input-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      color: #A9A9A9;
      font-size: 13px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background-color: #2A2A2A;
      border: 1px solid #444444;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }
    input:focus, textarea:focus {
      border-color: #D4AF37;
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: #D4AF37;
      color: #121212;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #A9A9A9;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>POST A WORKING PLACE</h2>
    <p class="subtitle">Rent out your open station to professional barbers</p>

    <form id="chairForm">
      <div class="input-group">
        <label for="shopName">Shop Name</label>
        <input type="text" id="shopName" placeholder="e.g. Dreams Hands Studios" required>
      </div>

      <div class="input-group">
        <label for="contactPhone">Contact Phone Number</label>
        <input type="tel" id="contactPhone" placeholder="e.g. +233500000000" required>
      </div>

      <div class="input-group">
        <label for="address">Shop Address / Location</label>
        <input type="text" id="address" placeholder="e.g. Kotoku" required>
      </div>

      <div class="input-group">
        <label for="price">Rental Price per Day (GHS)</label>
        <input type="number" id="price" placeholder="e.g. 150" required>
      </div>

      <div class="input-group">
        <label for="description">Station Features & Rules</label>
        <textarea id="description" rows="3" placeholder="Premium hydraulic chair, ring light included..." required></textarea>
      </div>

      <button type="submit">POST STATION LISTING</button>
    </form>

    <a href="feed.html" class="back-link">← Go view the Feed</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDmtTQJsuSSfJf3FgVlDFaoTBCxIGRXYo",
      authDomain: "dreamssmartapp.firebaseapp.com",
      projectId: "dreamssmartapp",
      storageBucket: "dreamssmartapp.firebasestorage.app",
      messagingSenderId: "679648849916",
      appId: "1:679648849916:web:9ad24dbfd209dd266a8c79"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('chairForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const shopName = document.getElementById('shopName').value;
      const contactPhone = document.getElementById('contactPhone').value;
      const address = document.getElementById('address').value;
      const price = document.getElementById('price').value;
      const description = document.getElementById('description').value;

      try {
        await addDoc(collection(db, "chair_listings"), {
          shop_name: shopName,
          contact_phone: contactPhone,
          location_address: address,
          price_per_day: parseFloat(price),
          currency: "GHS",
          description: description,
          is_available: true,
          posted_at: new Date().toISOString()
        });

        alert("Boom! Your open chair is officially listed with contact details!");
        document.getElementById('chairForm').reset();
      } catch (error) {
        alert("Listing failed: " + error.message);
      }
    });
  </script>

</body>
</html>
