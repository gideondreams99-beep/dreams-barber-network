<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreams Barbering Network Feed</title>
  <style>
    body {
      background-color: #121212;
      color: #FFFFFF;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .feed-container {
      width: 100%;
      max-width: 400px;
    }
    h2 {
      color: #D4AF37; /* Metallic Gold */
      text-align: center;
      margin-bottom: 5px;
    }
    p.subtitle {
      color: #A9A9A9; /* Ash Gray */
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
    }
    /* Toggle Tabs Styling */
    .toggle-container {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .toggle-btn {
      flex: 1;
      padding: 12px;
      background-color: #1E1E1E;
      border: 1px solid #333333;
      color: #A9A9A9;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .toggle-btn.active {
      border-color: #D4AF37;
      color: #D4AF37;
      background-color: #2A2A2A;
    }
    /* Filter Styling */
    .filter-group {
      margin-bottom: 20px;
      background-color: #1E1E1E;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333333;
    }
    .filter-group label {
      display: block;
      color: #A9A9A9;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .filter-group select {
      width: 100%;
      padding: 10px;
      background-color: #2A2A2A;
      border: 1px solid #444444;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .listing-card {
      background-color: #1E1E1E;
      border: 1px solid #333333;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer; /* Makes the card visibly tapable */
      transition: transform 0.1s ease;
    }
    .listing-card:active {
      transform: scale(0.98); /* Native press effect for phones */
    }
    .profile-header-block {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }
    .profile-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #D4AF37;
      background-color: #2A2A2A;
    }
    .shop-title {
      color: #D4AF37;
      font-size: 18px;
      font-weight: bold;
      margin: 0;
    }
    .location {
      color: #A9A9A9;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .meta-details {
      font-size: 12px;
      color: #A9A9A9;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .price-tag {
      display: inline-block;
      background-color: #2A2A2A;
      color: #FFF;
      border: 1px solid #D4AF37;
      padding: 5px 10px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .barber-role-tag {
      display: inline-block;
      background-color: #2A2A2A;
      color: #D4AF37;
      border: 1px solid #444444;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .media-scroll-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }
    .media-scroll-row img, .media-scroll-row video {
      width: 90px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #444;
      flex-shrink: 0;
      opacity: 0.7; /* Dimmed inside cards to hint at tapping card for full view */
    }
    .description {
      font-size: 14px;
      color: #E0E0E0;
      line-height: 1.4;
      margin-bottom: 15px;
    }
    .button-row {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      text-decoration: none;
      font-size: 13px;
    }
    .btn-whatsapp {
      background-color: #25D366;
      color: white;
    }
    .btn-call {
      background-color: #A9A9A9;
      color: #121212;
    }
    .nav-links {
      text-align: center;
      margin-top: 20px;
    }
    a {
      color: #A9A9A9;
      text-decoration: none;
      font-size: 14px;
      margin: 0 10px;
    }
    a:hover {
      color: #D4AF37;
    }

    /* PREMIUM POPUP MODAL STYLING */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: flex-end; /* Slides up from mobile bottom layout */
      z-index: 1000;
    }
    .modal-content {
      background-color: #1E1E1E;
      border-top: 3px solid #D4AF37;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
    }
    .close-modal-btn {
      background: #333333;
      color: #FFF;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      float: right;
      font-weight: bold;
      cursor: pointer;
    }
    .modal-gallery-title {
      color: #D4AF37;
      font-size: 14px;
      text-transform: uppercase;
      margin-top: 20px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .full-showcase-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #333;
    }
    .full-showcase-video {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #333;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="feed-container">
    <h2>DREAMS MARKETPLACE</h2>
    <p class="subtitle">Connecting Top Barbering Talent & Premium Shops</p>

    <!-- Master Toggle Tabs -->
    <div class="toggle-container">
      <div id="tabChairs" class="toggle-btn active" onclick="switchMode('chairs')">Chairs Available</div>
      <div id="tabBarbers" class="toggle-btn" onclick="switchMode('barbers')">Barbers Looking</div>
    </div>

    <!-- Dynamic Location Filter -->
    <div class="filter-group">
      <label for="cityFilter">Filter By City Location:</label>
      <select id="cityFilter">
        <option value="all">All Locations</option>
        <option value="accra">Accra</option>
        <option value="kotoku">Kotoku</option>
      </select>
    </div>

    <!-- The Feed Container -->
    <div id="listingsFeed">Loading marketplace data...</div>

    <div class="nav-links">
      <a href="index.html">← Register Profile</a> | 
      <a href="add-chair.html">Post an Open Chair →</a>
    </div>
  </div>

  <!-- POPUP OVERLAY INTERFACE -->
  <div id="profileModal" class="modal-overlay" onclick="closeProfileDetails(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="close-modal-btn" onclick="closeProfileDetails(null)">✕ Close</button>
      <div id="modalTargetBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDmtTQJsuSSfJf3FgVlDFaoTBCxIGRXYo",
      authDomain: "dreamssmartapp.firebaseapp.com",
      projectId: "dreamssmartapp",
      storageBucket: "dreamssmartapp.firebasestorage.app",
      messagingSenderId: "679648849916",
      appId: "1:679648849916:web:9ad24dbfd209dd266a8c79"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentMode = "chairs"; 
    let activeDataCache = []; // Caches profiles locally so card clicks display instantly

    async function loadMarketplace() {
      const feedElement = document.getElementById('listingsFeed');
      const selectedCity = document.getElementById('cityFilter').value;
      feedElement.innerHTML = "Fetching cloud data...";

      try {
        let collectionName = currentMode === "chairs" ? "chair_listings" : "users";
        let q = query(collection(db, collectionName), orderBy(currentMode === "chairs" ? "posted_at" : "created_at", "desc"));
        
        const querySnapshot = await getDocs(q);
        feedElement.innerHTML = "";
        activeDataCache = []; 
        let matchCount = 0;

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const docId = doc.id;
          
          let locationText = currentMode === "chairs" ? (data.location_address || "") : (data.location?.city || data.city || "");
          if (selectedCity !== "all" && !locationText.toLowerCase().includes(selectedCity)) {
            return;
          }

          // Save item details inside our memory array for interactive click events
          activeDataCache.push({ id: docId, ...data });

          matchCount++;
          const rawPhone = data.contact_phone || data.phone || "";
          const cleanPhone = rawPhone.replace(/\s+/g, '');
          
          let cardHtml = "";

          if (currentMode === "chairs") {
            const whatsappUrl = `https://wa.me/${cleanPhone}?text=Hello!%20I%20saw%20your%20station%20listing%20for%20${encodeURIComponent(data.shop_name)}%20on%20the%20app.`;
            
            let mediaPreviewHtml = "";
            if ((data.workspaceImages && data.workspaceImages.length > 0) || data.workspaceVideo) {
              mediaPreviewHtml += `<div class="media-scroll-row">`;
              if (data.workspaceVideo) mediaPreviewHtml += `<video src="${data.workspaceVideo}"></video>`;
              if (data.workspaceImages) data.workspaceImages.slice(0, 3).forEach(url => { mediaPreviewHtml += `<img src="${url}">`; });
              mediaPreviewHtml += `</div>`;
            }

            cardHtml = `
              <div class="listing-card" onclick="openProfileDetails('${docId}')">
                <div class="shop-title">${data.shop_name}</div>
                <div class="location">📍 ${data.location_address}</div>
                <div class="price-tag">${data.price_per_day} ${data.currency || "GH₵"} / day</div>
                ${mediaPreviewHtml}
                <div class="description">${data.description ? data.description.substring(0, 75) + '...' : ""}</div>
                <small style="color:#D4AF37; display:block; margin-bottom:12px;">👉 Tap card to view full room images & tour video</small>
                <div class="button-row" onclick="event.stopPropagation()">
                  <a href="${whatsappUrl}" target="_blank" class="btn btn-whatsapp">Chat WhatsApp</a>
                  <a href="tel:${cleanPhone}" onclick="alert('Shop Contact: ' + '${rawPhone}')" class="btn btn-call">Call</a>
                </div>
              </div>
            `;
          } else {
            const whatsappUrl = `https://wa.me/${cleanPhone}?text=Hello%20${encodeURIComponent(data.full_name)}!%20I%20saw%20your%20profile%20on%20the%20app.`;
            const avatarUrl = data.profilePicture || "https://via.placeholder.com/60/2A2A2A/FFFFFF?text=Cut";
            
            let payPreferenceText = "Not specified";
            if (data.payoutPreference) {
              const symbol = data.payoutPreference.type === 'Commission' ? '%' : 'GH₵';
              payPreferenceText = data.payoutPreference.type === 'Commission' ? `${data.payoutPreference.amount}${symbol} Commission` : `${symbol}${data.payoutPreference.amount}`;
            }

            let portfolioPreviewHtml = "";
            if (data.portfolioImages && data.portfolioImages.length > 0) {
              portfolioPreviewHtml += `<div class="media-scroll-row">`;
              data.portfolioImages.slice(0, 3).forEach(url => { portfolioPreviewHtml += `<img src="${url}">`; });
              portfolioPreviewHtml += `</div>`;
            }

            cardHtml = `
              <div class="listing-card" onclick="openProfileDetails('${docId}')">
                <div class="profile-header-block">
                  <img src="${avatarUrl}" class="profile-avatar">
                  <div>
                    <div class="shop-title">${data.full_name}</div>
                    <div class="location" style="margin:0;">📍 ${data.location?.city || data.city || "Accra"}</div>
                  </div>
                </div>
                <div class="barber-role-tag">✂️ Professional Barber</div>
                <div class="meta-details">
                  <strong>Experience:</strong> ${data.experienceYears || "0"} years | <strong>Prefers:</strong> ${payPreferenceText}
                </div>
                ${portfolioPreviewHtml}
                <small style="color:#D4AF37; display:block; margin-bottom:12px;">👉 Tap card to view profile picture & portfolio gallery</small>
                <div class="button-row" onclick="event.stopPropagation()">
                  <a href="${whatsappUrl}" target="_blank" class="btn btn-whatsapp">Message</a>
                  <a href="tel:${cleanPhone}" onclick="alert('Barber Contact: ' + '${rawPhone}')" class="btn btn-call">Call</a>
                </div>
              </div>
            `;
          }
          
          feedElement.innerHTML += cardHtml;
        });

        if (matchCount === 0) {
          feedElement.innerHTML = `<p style='text-align:center; color:#A9A9A9;'>No active postings here matching this city filter.</p>`;
        }

      } catch (error) {
        console.error(error);
        feedElement.innerHTML = "<p style='color:red;'>Failed to load marketplace items.</p>";
      }
    }

    // FUNCTION TO OPEN SPECIFIC PROFILE DETAILED MEDIA SHOWCASE
    window.openProfileDetails = function(id) {
      const targetItem = activeDataCache.find(item => item.id === id);
      if (!targetItem) return;

      const modalElement = document.getElementById('profileModal');
      const containerBody = document.getElementById('modalTargetBody');
      
      let htmlMarkup = "";

      if (currentMode === "chairs") {
        // Render detailed Shop Workspace layout structure
        let imagesMarkup = "";
        if (targetItem.workspaceImages) {
          targetItem.workspaceImages.forEach(url => {
            imagesMarkup += `<img src="${url}" class="full-showcase-img" alt="Shop Photo">`;
          });
        }

        let videoMarkup = "";
        if (targetItem.workspaceVideo) {
          videoMarkup = `
            <div class="modal-gallery-title">Shop Video Walkthrough</div>
            <video src="${targetItem.workspaceVideo}" class="full-showcase-video" controls autoplay muted playsinline></video>
          `;
        }

        htmlMarkup = `
          <h2 style="text-align:left; margin-bottom:5px;">${targetItem.shop_name}</h2>
          <div class="location">📍 ${targetItem.location_address}</div>
          <div class="price-tag">${targetItem.price_per_day} ${targetItem.currency || "GH₵"} / Day</div>
          <p class="description" style="margin-top:10px;">${targetItem.description || "No description provided."}</p>
          
          ${videoMarkup}
          
          <div class="modal-gallery-title">Workspace Showroom Photos</div>
          ${imagesMarkup || "<p style='color:#A9A9A9;'>No photos uploaded.</p>"}
        `;
      } else {
        // Render full Barber Portfolio layout structure
        const bigAvatar = targetItem.profilePicture || "https://via.placeholder.com/150/2A2A2A/FFFFFF?text=No+Photo";
        let cutsMarkup = "";
        if (targetItem.portfolioImages) {
          targetItem.portfolioImages.forEach(url => {
            cutsMarkup += `<img src="${url}" class="full-showcase-img" alt="Barber Cut">`;
          });
        }

        let payPreferenceText = "Not specified";
        if (targetItem.payoutPreference) {
          const symbol = targetItem.payoutPreference.type === 'Commission' ? '%' : 'GH₵';
          payPreferenceText = targetItem.payoutPreference.type === 'Commission' ? `${targetItem.payoutPreference.amount}${symbol} Commission` : `${symbol}${targetItem.payoutPreference.amount}`;
        }

        htmlMarkup = `
          <div style="text-align:center; margin-bottom:15px;">
            <img src="${bigAvatar}" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #D4AF37;">
            <h2 style="margin: 10px 0 5px 0;">${targetItem.full_name}</h2>
            <div class="location">📍 Based in ${targetItem.location?.city || targetItem.city || "Accra"}</div>
          </div>

          <div class="meta-details" style="background:#2a2a2a; padding:12px; border-radius:8px; font-size:14px; color:#FFF;">
            <strong>✂️ Experience:</strong> ${targetItem.experienceYears || "0"} Years<br>
            <strong>🎓 Education Level:</strong> ${targetItem.educationLevel || targetItem.education || "Certified"}<br>
            <strong>💰 Preference:</strong> <span style="color:#D4AF37; font-weight:bold;">${payPreferenceText}</span>
          </div>

          <p class="description" style="margin-top:15px;">${targetItem.bio || "No bio added."}</p>
          
          <div class="modal-gallery-title">Work Portfolio Cuts</div>
          ${cutsMarkup || "<p style='color:#A9A9A9;'>No portfolio photos uploaded yet.</p>"}
        `;
      }

      containerBody.innerHTML = htmlMarkup;
      modalElement.style.display = 'flex';
    }

    // FUNCTION TO CLOSE POPUP
    window.closeProfileDetails = function(event) {
      document.getElementById('profileModal').style.display = 'none';
      // Stop videos inside modal on close
      const modalVideo = document.querySelector('#modalTargetBody video');
      if (modalVideo) modalVideo.pause();
    }

    window.switchMode = function(mode) {
      currentMode = mode;
      document.getElementById('tabChairs').classList.toggle('active', mode === 'chairs');
      document.getElementById('tabBarbers').classList.toggle('active', mode === 'barbers');
      loadMarketplace();
    }

    document.getElementById('cityFilter').addEventListener('change', loadMarketplace);
    loadMarketplace();
  </script>

</body>
</html>
