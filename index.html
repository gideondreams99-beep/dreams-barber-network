<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreams Smart Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121212;
      --surface: #1e1e1e;
      --accent-gold: #d4af37;
      --text-white: #ffffff;
      --text-gray: #aaaaaa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-white); min-height: 100vh; }

    /* Gatekeeper Login Screen */
    #loginScreen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-dark);
      z-index: 1000;
      padding: 30px;
      text-align: center;
    }
    .login-branding { margin-bottom: 40px; }
    .login-branding h1 { color: var(--accent-gold); font-size: 2.2rem; font-weight: 600; letter-spacing: 1px; }
    .login-branding p { color: var(--text-gray); font-size: 0.95rem; margin-top: 10px; }
    
    .google-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      padding: 14px 24px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
      transition: transform 0.2s;
    }
    .google-login-btn img { width: 22px; height: 22px; margin-right: 12px; }

    /* Main Application Container (Hidden by default) */
    #mainApp { display: none; padding-bottom: 80px; }

    /* Header & Navigation */
    header { background: var(--surface); padding: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .logo { font-weight: 600; color: var(--accent-gold); font-size: 1.2rem; }
    
    .user-profile { display: flex; align-items: center; gap: 10px; }
    .user-profile img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent-gold); }
    .logout-btn { background: transparent; border: none; color: var(--text-gray); font-size: 0.8rem; text-decoration: underline; cursor: pointer; }

    .search-container { position: relative; }
    .search-bar { width: 100%; background: #2a2a2a; border: 1px solid #444; padding: 10px 15px; border-radius: 25px; color: #fff; font-size: 0.9rem; }
    
    /* Updated Categories Slider */
    .categories-slider { display: flex; overflow-x: auto; padding: 15px 10px; gap: 10px; scrollbar-width: none; }
    .categories-slider::-webkit-scrollbar { display: none; }
    .category-chip { background: var(--surface); border: 1px solid #333; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; white-space: nowrap; color: var(--text-gray); }
    .category-chip.active { background: var(--accent-gold); color: #000; font-weight: 600; border-color: var(--accent-gold); }

    /* Product Grid */
    .feed-container { padding: 0 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .product-card { background: var(--surface); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; border: 1px solid #2a2a2a; }
    .product-img { width: 100%; aspect-ratio: 1; background: #252525; object-fit: cover; }
    .product-info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
    .product-price { color: var(--accent-gold); font-weight: 600; font-size: 1.1rem; }
    .product-title { font-size: 0.85rem; color: var(--text-white); margin: 4px 0; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .product-location { font-size: 0.75rem; color: var(--text-gray); }
    .verified-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: var(--accent-gold); padding: 2px 6px; font-size: 0.65rem; border-radius: 4px; border: 1px solid var(--accent-gold); }

    /* Floating Post Button */
    .fab-post { position: fixed; bottom: 20px; right: 20px; background: var(--accent-gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-decoration: none; z-index: 99; }
  </style>
</head>
<body>

  <!-- Mandatory Login Wall Screen -->
  <div id="loginScreen">
    <div class="login-branding">
      <h1>DREAMS SMARTS</h1>
      <p>Sign in to access the premium barbering & styling network</p>
    </div>
    <button class="google-login-btn" id="googleSignInBtn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google UI"> Sign in with Google
    </button>
  </div>

  <!-- Locked Main Content Panel -->
  <div id="mainApp">
    <header>
      <div class="header-top">
        <div class="logo">DREAMS SMARTS</div>
        <div class="user-profile">
          <img src="" id="userAvatar" alt="Profile View">
          <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search for shops, home services, or items...">
      </div>
    </header>

    <!-- Requested Updated Clean Category Chips -->
    <div class="categories-slider">
      <div class="category-chip active">All Feed</div>
      <div class="category-chip">Home Barbering Services</div>
      <div class="category-chip">Salons</div>
    </div>

    <main class="feed-container" id="listingsFeed">
      <!-- Listings loaded dynamically -->
    </main>

    <a href="add-chair.html" class="fab-post">+</a>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
