<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber Me</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 font-sans antialiased text-gray-100 pb-24">

  <!-- Auth Screen -->
  <div id="auth-screen" class="min-h-screen flex flex-col justify-center items-center p-6 bg-zinc-900">
    <div class="text-center space-y-6 w-full max-w-sm">
      <h1 class="text-4xl text-amber-500 font-extrabold tracking-tight">Barber Me</h1>
      <button id="btn-login" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 rounded-xl shadow-lg">Sign in with Google</button>
    </div>
  </div>

  <!-- Role Selection Screen -->
  <div id="role-screen" class="hidden min-h-screen flex flex-col justify-center items-center p-6 bg-zinc-900">
    <div class="w-full max-w-sm text-center">
      <h2 class="text-2xl font-black text-white mb-6">Which best describes you?</h2>
      <div class="flex flex-col gap-4">
        <button id="btn-barber" class="p-5 bg-zinc-800 border-2 border-amber-500 rounded-2xl text-left">
          <span class="block text-lg font-bold text-amber-500">I am a Barber</span>
        </button>
        <button id="btn-owner" class="p-5 bg-zinc-800 border-2 border-zinc-700 rounded-2xl text-left">
          <span class="block text-lg font-bold text-gray-200">I am a Shop Owner</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main App Screen (Placeholder for now) -->
  <!-- Main App Screen -->
<div id="main-app" class="hidden max-w-md mx-auto p-4 text-center mt-10">
  <h2 class="text-xl text-amber-500 font-bold mb-1">Welcome, <span id="user-display-name"></span>!</h2>
  <p id="user-role-text" class="text-sm text-gray-400 mb-2"></p>
  
  <!-- Edit Profile Button -->
  <button id="btn-edit-profile" class="text-amber-500 underline text-sm mb-6">Edit My Profile</button>
  
  <div id="feed-container" class="mt-8 space-y-3 text-left"></div>

  <button id="btn-logout" class="mt-8 w-full bg-red-950/40 text-red-500 border border-red-900 px-4 py-3 rounded-xl font-bold">Logout</button>
</div>

<!-- Profile Edit Screen (Hidden by default) -->
<div id="profile-edit-screen" class="hidden fixed inset-0 bg-zinc-950 p-6 z-50 flex flex-col justify-center">
  <h2 class="text-xl font-bold mb-4 text-white">Edit Profile</h2>
  <input type="text" id="edit-name" placeholder="Full Name" class="w-full bg-zinc-800 p-3 rounded-lg mb-3 text-white">
  <input type="text" id="edit-pic" placeholder="Profile Image URL" class="w-full bg-zinc-800 p-3 rounded-lg mb-3 text-white">
  <button id="save-profile" class="w-full bg-amber-600 py-3 rounded-lg font-bold text-white">Save Changes</button>
  <button id="cancel-edit" class="w-full mt-2 text-gray-400">Cancel</button>
</div>
<!-- Inside main-app div, below the logout button -->
<div id="feed-container" class="mt-8 space-y-4">
  <!-- Barbers will appear here -->
</div>

  <script type="module" src="js/main.js"></script>
</body>
