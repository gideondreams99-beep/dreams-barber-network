<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber Connect Platform</title>
  <style>
    /* Premium Dark/Gold Aesthetic Styles */
    body {
      background-color: #121212;
      color: #FFFFFF;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .form-container {
      background-color: #1E1E1E;
      border: 1px solid #333333;
      border-radius: 12px;
      padding: 25px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    h2 {
      color: #D4AF37; /* Metallic Gold Accent */
      text-align: center;
      margin-bottom: 5px;
    }
    p.subtitle {
      color: #A9A9A9; /* Ash Accent */
      text-align: center;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .input-group {
      margin-bottom: 18px;
    }
    .dynamic-section {
      border-left: 2px solid #D4AF37;
      padding-left: 12px;
      margin-bottom: 18px;
    }
    label {
      display: block;
      color: #A9A9A9;
      font-size: 13px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background-color: #2A2A2A;
      border: 1px solid #444444;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #D4AF37;
      outline: none;
    }
    .currency-wrap {
      display: flex;
      align-items: center;
    }
    .currency-label {
      background-color: #333333;
      padding: 12px;
      border: 1px solid #444444;
      border-right: none;
      border-radius: 6px 0 0 6px;
      color: #D4AF37;
      font-weight: bold;
    }
    .currency-wrap input {
      border-radius: 0 6px 6px 0;
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: #D4AF37;
      color: #121212;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #AA882C;
    }
    .skip-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #A9A9A9;
      text-decoration: none;
      font-size: 14px;
    }
    .skip-link:hover {
      color: #D4AF37;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>DREAMS SMART APP</h2>
    <p class="subtitle">Create Your Professional Barbering Network Profile</p>

    <!-- Registration Form Fields -->
    <form id="profileForm">
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="e.g. Gideon Dreams" required>
      </div>

      <div class="input-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. +233XXXXXXXXX" required>
      </div>

      <div class="input-group">
        <label for="role">I am a:</label>
        <select id="role" required>
          <option value="barber">Barber (Looking for a chair/work)</option>
          <option value="shop_owner">Shop Owner (Have chairs to rent out)</option>
        </select>
      </div>

      <!-- BARBER EXTRA FIELDS SECTION (Shows when role is Barber) -->
      <div id="barberSection" class="dynamic-section">
        <div class="input-group">
          <label for="profilePic">Profile Picture</label>
          <input type="file" id="profilePic" accept="image/*">
        </div>

        <div class="input-group">
          <label for="experienceYears">Working Experience (Years)</label>
          <input type="number" id="experienceYears" placeholder="e.g. 3" min="0">
        </div>

        <div class="input-group">
          <label for="portfolioPhotos">Pictures of Your Works</label>
          <input type="file" id="portfolioPhotos" accept="image/*" multiple>
        </div>

        <div class="input-group">
          <label for="education">Level of Education</label>
          <select id="education">
            <option value="Apprenticeship">Apprenticeship / Practical Training</option>
            <option value="JHS/SHS">High School / JHS / SHS</option>
            <option value="Certificate">Vocational / Barbering Certificate</option>
            <option value="Diploma">Diploma / Higher Education</option>
          </select>
        </div>

        <div class="input-group">
          <label for="payoutPreference">Payment Mode Preference</label>
          <select id="payoutPreference">
            <option value="Salary">Monthly Salary</option>
            <option value="Commission">Commission Basis</option>
            <option value="Chair Rent">Chair Rent / Sales Fee</option>
          </select>
        </div>

        <div class="input-group">
          <label id="amountLabel" for="payoutAmount">Salary Amount</label>
          <div class="currency-wrap">
            <span id="cediSign" class="currency-label">GH₵</span>
            <input type="number" id="payoutAmount" placeholder="e.g. 1500" min="0">
          </div>
        </div>
      </div>

      <!-- SHOP OWNER EXTRA FIELDS SECTION (Shows when role is Shop Owner) -->
      <div id="shopOwnerSection" class="dynamic-section" style="display: none;">
        <div class="input-group">
          <label for="shopPhotos">Pictures of Your Shop</label>
          <input type="file" id="shopPhotos" accept="image/*" multiple>
        </div>

        <div class="input-group">
          <label for="shopVideo">Video Tour of Your Shop</label>
          <input type="file" id="shopVideo" accept="video/*">
        </div>
      </div>

      <div class="input-group">
        <label for="city">City (Location)</label>
        <input type="text" id="city" value="Accra" required>
      </div>

      <div class="input-group">
        <label for="bio">Bio / Experience</label>
        <textarea id="bio" rows="3" placeholder="Tell shops or barbers about your work, specialties, or chair availability..."></textarea>
      </div>

      <button type="submit">CREATE PROFILE</button>
    </form>
    
    <a href="feed.html" class="skip-link">Skip to Marketplace Feed →</a>
  </div>

  <!-- Form Actions and Dynamic Show/Hide Logic -->
  <script type="module">
    import { createUserProfile } from './firebase-config.js';

    const roleSelect = document.getElementById('role');
    const barberSection = document.getElementById('barberSection');
    const shopOwnerSection = document.getElementById('shopOwnerSection');
    const payoutPreference = document.getElementById('payoutPreference');
    const amountLabel = document.getElementById('amountLabel');
    const cediSign = document.getElementById('cediSign');

    // Automatically change visible input options when user picks Barber or Shop Owner
    roleSelect.addEventListener('change', () => {
      if (roleSelect.value === 'barber') {
        barberSection.style.display = 'block';
        shopOwnerSection.style.display = 'none';
      } else {
        barberSection.style.display = 'none';
        shopOwnerSection.style.display = 'block';
      }
    });

    // Dynamically change text labels if they choose Commission (%) instead of Salary (GH₵)
    payoutPreference.addEventListener('change', () => {
      if (payoutPreference.value === 'Commission') {
        amountLabel.textContent = "Commission Percentage (%)";
        cediSign.textContent = "%";
      } else if (payoutPreference.value === 'Chair Rent') {
        amountLabel.textContent = "Chair Rent Amount Fee";
        cediSign.textContent = "GH₵";
      } else {
        amountLabel.textContent = "Salary Amount";
        cediSign.textContent = "GH₵";
      }
    });

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const role = document.getElementById('role').value;
      const city = document.getElementById('city').value;
      const bio = document.getElementById('bio').value;

      // Temporary placeholder ID for testing layout
      const temporaryUserId = "test_user_" + Math.floor(Math.random() * 10000);

      // Trigger standard save
      await createUserProfile(temporaryUserId, fullName, phone, role, city, bio);

      window.location.href = "feed.html";
    });
  </script>

</body>
</html>
